<!DOCTYPE html>
<html>
<body>

<h2>Student Result</h2>

<script>
let maths = 80;
let science = 75;
let english = 90;

let total = maths + science + english;
let percentage = total / 3;

document.write("Maths: " + maths + "<br>");
document.write("Science: " + science + "<br>");
document.write("English: " + english + "<br><br>");

document.write("Total Marks: " + total + "<br>");
document.write("Percentage: " + percentage + "%<br>");

if(percentage >= 40)
{
    document.write("Result: Pass");
}
else
{
    document.write("Result: Fail");
}
</script>

</body>
</html>
